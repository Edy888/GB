<!DOCTYPE html>
<html>
<head>
    <title>Заголовок страницы</title>
</head>

<body>  <!-- Здесь размещается контент, видимый на веб-странице -->

    
    <header> 
        <!-- Заголовок и верхнее меню -->
    </header>

    <nav>
        <!-- Навигационное меню -->
    </nav>

    <main>
        <!-- Основное содержание страницы -->
    </main>

    <section>
        <!-- Секции с разными частями контента -->
    </section>

    <aside>
        <!-- Боковая панель с дополнительной информацией -->
    </aside>

    <footer>
        <!-- Нижний колонтитул и информация о копирайте -->
    </footer>
</body>
</html>


<!-- ________________________________________________________________________________________________ -->

<!-- напиши основные элементы header -->

<!-- Элемент <header> в HTML представляет собой область верхней части веб-страницы, где размещается информация, связанная с заголовком и верхним 
меню навигации. Вот основные элементы, которые часто включаются в <header>: -->

<!-- 1. <h1>, <h2>, <h3>, и т. д.: Эти элементы используются для отображения заголовка страницы, который может содержать название веб-сайта 
или текущей страницы. -->

<header>
    <h1>Мой Веб-Сайт</h1>
</header>

<!-- 2. <img>: Для вставки логотипа или изображения, связанного с сайтом. Обычно используется внутри <a> для создания ссылки на главную страницу. -->

<header>
    <a href="главная.html">
        <img src="логотип.png" alt="Логотип моего сайта">
    </a>
</header>

<!-- 3. <nav>: Элемент, в котором размещается верхнее меню навигации. Это меню может содержать ссылки на разделы сайта.-->
    <header>
        <nav>
            <ul>
                <li><a href="главная.html">Главная</a></li>
                <li><a href="о_нас.html">О нас</a></li>
                <li><a href="контакты.html">Контакты</a></li>
            </ul>
        </nav>
    </header>

<!-- 4. <div> или другие контейнеры: Вы можете использовать дополнительные контейнеры, такие как <div>, для группировки элементов в <header> 
и стилизации их с помощью CSS. -->

<header>
    <div id="левая_часть">
        <h1>Мой Веб-Сайт</h1>
    </div>
    <div id="правая_часть">
        <nav>
            <ul>
                <li><a href="главная.html">Главная</a></li>
                <li><a href="о_нас.html">О нас</a></li>
                <li><a href="контакты.html">Контакты</a></li>
            </ul>
        </nav>
    </div>
</header>


<!-- опиши основные контейнеры -->

<!-- <div> (Division): <div> - это универсальный контейнер, который не несет семантической информации. Он используется для группировки элементов 
и применения стилей CSS. Этот контейнер часто используется для создания разметки и разделения страницы на блоки. -->
